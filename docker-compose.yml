services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - .:/app
      - rag_storage:/app/storage
      - ~/.aws:/root/.aws:ro
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python -m app.healthcheck

volumes:
  qdrant_data:
  rag_storage:
