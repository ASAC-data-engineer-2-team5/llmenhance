services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - .:/app
      - rag_storage:/app/storage
    working_dir: /app
    command: python -m app.healthcheck

volumes:
  qdrant_data:
  rag_storage:
