name: Terraform CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/terraform-ci.yml"
      - ".github/workflows/deploy-mvp.yml"
      - "docker-compose.aws.yml"
      - "infra/terraform/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/terraform-ci.yml"
      - ".github/workflows/deploy-mvp.yml"
      - "docker-compose.aws.yml"
      - "infra/terraform/**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

jobs:
  validate:
    name: validate terraform and compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Terraform init bootstrap without backend
        run: terraform -chdir=infra/terraform/bootstrap init -backend=false

      - name: Terraform validate bootstrap
        run: terraform -chdir=infra/terraform/bootstrap validate

      - name: Terraform init MVP without backend
        run: terraform -chdir=infra/terraform/envs/mvp init -backend=false

      - name: Terraform validate MVP
        run: terraform -chdir=infra/terraform/envs/mvp validate

      - name: Validate AWS Docker Compose file
        run: docker compose -f docker-compose.aws.yml config --quiet

  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ vars.AWS_ROLE_TO_ASSUME != '' && vars.TF_STATE_BUCKET != '' && vars.OLLAMA_BASE_URL != '' }}

    permissions:
      contents: read
      id-token: write

    env:
      TF_VAR_ollama_base_url: ${{ vars.OLLAMA_BASE_URL }}
      TF_VAR_streamlit_allowed_cidr_blocks: ${{ vars.STREAMLIT_ALLOWED_CIDR_BLOCKS || '[]' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure Terraform backend
        working-directory: infra/terraform/envs/mvp
        run: |
          cat > backend.hcl <<EOF
          bucket = "${{ vars.TF_STATE_BUCKET }}"
          region = "${{ env.AWS_REGION }}"
          EOF

      - name: Terraform init MVP
        run: terraform -chdir=infra/terraform/envs/mvp init -backend-config=backend.hcl

      - name: Terraform plan MVP
        run: terraform -chdir=infra/terraform/envs/mvp plan -no-color -input=false
